<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>新建 Paste</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <nav class="nav">
    <a href="/">新建</a>
    <a href="/list">所有记录</a>
  </nav>
  <main class="main">
    <h1>新建 Paste</h1>
    <form action="/paste" method="post" enctype="multipart/form-data" class="form">
      <label for="content">内容 <span class="required">*</span></label>
      <textarea id="content" name="content" rows="12" required></textarea>

      <label for="title">标题</label>
      <input type="text" id="title" name="title" placeholder="可选">

      <label for="author">作者</label>
      <input type="text" id="author" name="author" placeholder="可选">

      <label for="language">语法高亮</label>
      <select id="language" name="language">
        <option value="">纯文本</option>
        <option value="python">Python</option>
        <option value="javascript">JavaScript</option>
        <option value="rust">Rust</option>
        <option value="bash">Bash</option>
        <option value="json">JSON</option>
        <option value="html">HTML</option>
        <option value="css">CSS</option>
        <option value="sql">SQL</option>
      </select>

      <label for="expires">保留时间</label>
      <select id="expires" name="expires">
        <option value="1d">1 天</option>
        <option value="1w">1 周</option>
        <option value="1m">1 月</option>
        <option value="never">长期</option>
      </select>

      <label for="files">图片 / 附件（可多选）</label>
      <input type="file" id="files" name="files" multiple accept="image/*,.pdf,.txt,.zip,.json,.csv">

      <button type="submit" class="btn btn-primary">提交</button>
    </form>
  </main>
  <script src="/static/js/app.js"></script>
</body>
</html>
