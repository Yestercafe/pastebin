<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>所有记录</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <nav class="nav">
    <a href="/">新建</a>
    <a href="/list">所有记录</a>
  </nav>
  <main class="main">
    <h1>所有记录</h1>
    {% if items and items | length > 0 %}
    <div class="table-wrap">
      <table class="list-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>标题</th>
            <th>作者</th>
            <th>创建时间</th>
            <th>过期时间</th>
            <th>状态</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody>
          {% for item in items %}
          <tr>
            <td data-label="ID"><a href="/p/{{ item.id }}">{{ item.id }}</a></td>
            <td data-label="标题">{{ item.title }}</td>
            <td data-label="作者">{{ item.author }}</td>
            <td data-label="创建时间">{{ item.created_at }}</td>
            <td data-label="过期时间">{{ item.expires_at }}</td>
            <td data-label="状态">{{ "已过期" if item.expired else "有效" }}</td>
            <td class="actions" data-label="操作">
              <a href="/p/{{ item.id }}" class="btn btn-sm">查看</a>
              <a href="/p/{{ item.id }}/edit" class="btn btn-sm">编辑</a>
              <form action="/p/{{ item.id }}/delete" method="post" class="inline-form" onsubmit="return confirm('确定删除？');">
                <button type="submit" class="btn btn-sm btn-danger">删除</button>
              </form>
            </td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
    {% else %}
    <p class="empty">暂无记录。</p>
    {% endif %}
  </main>
  <script src="/static/js/app.js"></script>
</body>
</html>
