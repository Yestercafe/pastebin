# Pastebin 配置文件
# 路径可由环境变量 CONFIG 或 PASTEBIN_CONFIG 指定，默认当前目录下的 pastebin.toml。
# 文件不存在时使用内置默认值。

# 数据库连接（SQLite）
database-url = "sqlite://pastebin.db"

# 模板目录（相对路径先按当前工作目录，再按可执行文件所在目录）
templates-dir = "templates"

# 上传与附件存储目录
data-dir = "data"

# 静态资源目录
static-dir = "static"

# 监听地址与端口
host = "127.0.0.1"
port = 8080
